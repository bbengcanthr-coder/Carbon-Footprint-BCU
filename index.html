<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="Logo bcu.png">
    <title>Carbon Dashboard | Academic Research</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="top-nav">
        <div class="wrapper">
            <div class="brand">
                <img src="Logo bcu.png" alt="University Logo" class="logo">
                <div class="brand-info">
                    <span class="uni-name">BENGCHANH UNIVERSITY RESEARCH</span>
                    <span class="project-tag">Climate Action Unit</span>
                </div>
            </div>
        </div>
    </nav>

    <main class="wrapper main-content">
        <header class="header">
            <h1>Carbon Tracker <span class="v2">v2.0</span></h1>
            <p>ประเมินผลกระทบต่อสิ่งแวดล้อมรายบุคคล ตามมาตรฐานความยั่งยืนสากล</p>
        </header>

        <div class="dashboard-grid">
            <aside class="input-card">
                <form id="carbonForm">
                    <div class="input-section">
                        <label class="section-title">01 การเดินทาง</label>
                        <div class="field">
                            <label>รูปแบบพาหนะ</label>
                            <select id="transport">
                                <option value="none">เดิน / จักรยาน (0.0)</option>
                                <option value="bus">รถโดยสารสาธารณะ</option>
                                <option value="mrt">รถไฟฟ้า MRT/BTS</option>
                                <option value="motor">รถจักรยานยนต์</option>
                                <option value="car">รถยนต์ส่วนตัว</option>
                            </select>
                        </div>
                        <div class="field">
                            <label>ระยะทางรวม (กม./วัน)</label>
                            <input type="number" id="distance" placeholder="0.0" step="0.1">
                        </div>
                    </div>

                    <div class="input-section">
                        <label class="section-title">02 พลังงาน</label>
                        <div class="field">
                            <label>เปิดแอร์ (ชั่วโมง/วัน)</label>
                            <input type="number" id="ac" placeholder="0">
                        </div>
                    </div>

                    <div class="input-section">
                        <label class="section-title">03 อาหาร</label>
                        <div class="field">
                            <label>ประเภทการรับประทาน</label>
                            <select id="food">
                                <option value="vegan">มังสวิรัติ (Low)</option>
                                <option value="normal">ทั่วไป (Normal)</option>
                                <option value="meat">เน้นเนื้อสัตว์ (High)</option>
                            </select>
                        </div>
                    </div>

                    <button type="submit" class="btn-calculate">วิเคราะห์ข้อมูล</button>
                </form>
            </aside>

            <section id="results" class="result-card hidden">
                <div id="statusIndicator" class="status-bar">
                    <span id="statusText">วิเคราะห์สำเร็จ</span>
                </div>

                <div class="value-box">
                    <h2 id="finalScore">0.00</h2>
                    <p>kgCO₂e / วัน</p>
                </div>

                <div class="analysis-box">
                    <h3>บทวิเคราะห์รายวัน</h3>
                    <div id="summaryText" class="summary-p">
                        ข้อมูลของคุณกำลังถูกประมวลผลเทียบกับค่าเฉลี่ยเป้าหมาย 5.0 kgCO₂e...
                    </div>
                </div>

                <div class="comparison">
                    <div class="comp-item">
                        <span>ของคุณ</span>
                        <div class="bar-bg"><div id="userBar" class="bar-fill"></div></div>
                    </div>
                    <div class="comp-item">
                        <span>เป้าหมายโลก</span>
                        <div class="bar-bg"><div class="bar-fill goal" style="width: 35%"></div></div>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
